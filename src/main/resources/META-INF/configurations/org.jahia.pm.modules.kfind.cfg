# default configuration - won't be overridden

# Configuration for the kfind module.
#
# minSearchChars — minimum number of characters the user must type before
# a content search query is fired. Default is 3.
#
minSearchChars=4

# defaultDisplayedResults — number of results shown per section before the
# user clicks "show more". Default is 5.
#
defaultDisplayedResults=5

# augmentedFindDelayInTypingToLaunchSearch — debounce delay (in ms) before
# firing a search query when augmented search is enabled. Default is 300.
#
augmentedFindDelayInTypingToLaunchSearch=300

# jcrFindDelayInTypingToLaunchSearch — debounce delay (in ms) before
# firing a search query when augmented search is NOT enabled (JCR fallback).
# Default is 300.
#
jcrFindDelayInTypingToLaunchSearch=300

# uiFeaturesEnabled — whether the UI features search table is shown.
# Default is true.
#
uiFeaturesEnabled=true

# uiFeaturesMaxResults — number of results shown in the UI features table.
# Default is 2.
#
uiFeaturesMaxResults=2

# jcrMediaEnabled — whether the JCR media search table is shown.
# Default is true.
#
jcrMediaEnabled=true

# jcrMediaMaxResults — number of results shown in the JCR media table.
# Default is 2.
#
jcrMediaMaxResults=2

# jcrPagesEnabled — whether the JCR pages search table is shown (when
# augmented search is not available). Default is true.
#
jcrPagesEnabled=true

# jcrPagesMaxResults — number of results shown in the JCR pages table.
# Default is 4.
#
jcrPagesMaxResults=4

# jcrMainResourcesEnabled — whether the JCR main resources search table
# is shown (when augmented search is not available). Default is true.
#
jcrMainResourcesEnabled=true

# jcrMainResourcesMaxResults — number of results shown in the JCR main
# resources table. Default is 4.
#
jcrMainResourcesMaxResults=4

# urlReverseLookupEnabled — whether the URL reverse lookup feature is
# enabled. When enabled, users can paste the live URL of a page and
# kfind will resolve it via vanity URL / path matching so they can
# edit the matching node. Default is true.
#
urlReverseLookupEnabled=true
