# default configuration - won't be overridden

# Configuration for the kFind module.
#
# typeOfJCRGraphQL — controls which JCR GraphQL query is used for the
# content search fallback (when augmented search is not available for the site).
#
# Allowed values:
#   nodesByQuery     — uses a JCR-SQL2 full-text query (default, broader scope)
#   nodesByCriteria  — uses structured criteria (nodeType jnt:page, site-scoped)
#
typeOfJCRGraphQL=nodesByCriteria

# minSearchChars — minimum number of characters the user must type before
# a content search query is fired. Default is 3.
#
minSearchChars=3

# defaultDisplayedResults — number of results shown per section before the
# user clicks "show more". Default is 5.
#
defaultDisplayedResults=5

# augmentedFindDelayInTypingToLaunchSearch — debounce delay (in ms) before
# firing a search query when augmented search is enabled. Default is 300.
#
augmentedFindDelayInTypingToLaunchSearch=300

# jcrFindDelayInTypingToLaunchSearch — debounce delay (in ms) before
# firing a search query when augmented search is NOT enabled (JCR fallback).
# Default is 300.
#
jcrFindDelayInTypingToLaunchSearch=300
